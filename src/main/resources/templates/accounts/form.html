<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${editing} ? 'Edit Account' : 'New Account'">Account Form</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-piggy-bank me-2"></i>
            Smart Finance Assistant
        </a>
    </div>
</nav>

<div class="container mt-4">

    <div class="form-container">

        <div class="card">

            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-university me-2"></i>
                    <span th:text="${editing} ? 'Edit Account' : 'Create New Account'">
                        Account Form
                    </span>
                </h4>
            </div>

            <div class="card-body">

                <!-- Error message -->
                <div th:if="${errorMessage}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <!-- FORM -->
                <form th:action="${editing} ?
                                 @{'/accounts/' + ${accountId} + '/edit'} :
                                 @{/accounts/new}"
                      th:object="${accountForm}"
                      method="post">


                    <!-- ACCOUNT NAME -->
                    <div class="mb-3">

                        <label class="form-label">
                            <i class="fas fa-tag me-1"></i>
                            Account Name
                        </label>

                        <input type="text"
                               th:field="*{accountName}"
                               class="form-control"
                               placeholder="Main Checking"
                               required>

                    </div>


                    <!-- ACCOUNT TYPE -->
                    <div class="mb-3">

                        <label class="form-label">
                            <i class="fas fa-list me-1"></i>
                            Account Type
                        </label>

                        <select th:field="*{accountType}"
                                class="form-select"
                                required>

                            <option value="">Select type</option>

                            <option th:each="type : ${accountTypes}"
                                    th:value="${type}"
                                    th:text="${type}">
                            </option>

                        </select>

                    </div>


                    <!-- INITIAL BALANCE -->
                    <div class="mb-3"
                         th:if="${editing != true}">

                        <label class="form-label">
                            <i class="fas fa-dollar-sign me-1"></i>
                            Initial Balance
                        </label>

                        <div class="input-group">

                            <span class="input-group-text">$</span>

                            <input type="number"
                                   th:field="*{initialBalance}"
                                   class="form-control"
                                   step="0.01"
                                   min="0"
                                   placeholder="0.00"
                                   required>

                        </div>

                    </div>


                    <!-- BUTTONS -->
                    <div class="d-flex justify-content-between">

                        <a href="/accounts"
                           class="btn btn-secondary">

                            <i class="fas fa-arrow-left me-2"></i>
                            Cancel

                        </a>


                        <button type="submit"
                                class="btn btn-primary">

                            <i class="fas fa-save me-2"></i>

                            <span th:text="${editing} ?
                                           'Update Account' :
                                           'Create Account'">
                            </span>

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
